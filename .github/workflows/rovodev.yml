name: Build Rovo Dev

on:
  push:
    branches: [main]
    paths:
      - 'images/rovodev/**'
  workflow_dispatch:
    inputs:
      acli_version:
        description: 'acli version (e.g. 1.3.18-stable)'
        required: false
        default: ''
      force_rebuild:
        description: 'Force rebuild even if tag already exists'
        type: boolean
        default: false

env:
  GHCR_IMAGE: ghcr.io/rahulsharma0810/rovodev

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve acli version
        id: version
        run: |
          version="${{ inputs.acli_version }}"
          if [[ -z "$version" ]]; then
            version=$(grep 'ARG ACLI_VERSION=' images/rovodev/Dockerfile | cut -d= -f2)
          fi
          echo "acli_version=$version" >> $GITHUB_OUTPUT
          echo "Using acli version: $version"

      - name: Check if should build
        id: check
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GH_PACKAGES_TOKEN }}" \
            "https://ghcr.io/v2/rahulsharma0810/rovodev/manifests/latest")
          if [[ "$status" == "200" && "${{ inputs.force_rebuild }}" != "true" && "${{ github.event_name }}" != "push" ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: docker/setup-qemu-action@v3
        if: steps.check.outputs.skip != 'true'
      - uses: docker/setup-buildx-action@v3
        if: steps.check.outputs.skip != 'true'
      - uses: docker/login-action@v3
        if: steps.check.outputs.skip != 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PACKAGES_TOKEN }}
      - uses: docker/build-push-action@v6
        if: steps.check.outputs.skip != 'true'
        with:
          context: images/rovodev
          file: images/rovodev/Dockerfile
          build-args: ACLI_VERSION=${{ steps.version.outputs.acli_version }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.acli_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
