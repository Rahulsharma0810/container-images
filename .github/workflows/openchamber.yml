name: Build OpenChamber

on:
  schedule:
    - cron: '0 5 * * 1'  # weekly Monday 5am
  push:
    branches: [main]
    paths:
      - 'images/openchamber/**'
  workflow_dispatch:
    inputs:
      kimaki_version:
        description: 'Kimaki version (e.g. 0.9.1). Leave empty to use Dockerfile default.'
        required: false
        default: ''
      force_rebuild:
        description: 'Force rebuild'
        type: boolean
        default: false

env:
  IMAGE: sharmarahul0810/openchamber
  GHCR_IMAGE: ghcr.io/rahulsharma0810/openchamber

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve kimaki version
        id: version
        run: |
          version="${{ inputs.kimaki_version }}"
          if [[ -z "$version" ]]; then
            version=$(grep 'ARG KIMAKI_VERSION=' images/openchamber/Dockerfile | cut -d= -f2)
          fi
          echo "kimaki_version=$version" >> $GITHUB_OUTPUT
          echo "Using kimaki version: $version"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PACKAGES_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: images/openchamber
          file: images/openchamber/Dockerfile
          build-args: KIMAKI_VERSION=${{ steps.version.outputs.kimaki_version }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: ${{ github.event_name == 'schedule' || inputs.force_rebuild == 'true' }}
