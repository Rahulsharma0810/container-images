name: Build MCPHub

on:
  schedule:
    - cron: '0 4 * * *'
  push:
    branches: [main]
    paths:
      - 'images/mcphub/**'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild'
        type: boolean
        default: false

env:
  IMAGE: sharmarahul0810/mcphub
  GHCR_IMAGE: ghcr.io/rahulsharma0810/mcphub
  UPSTREAM: samanhappy/mcphub

jobs:
  # ────────────────────────────────────────────────
  # Latest — upstream image + jira additions
  # Tags: latest
  # ────────────────────────────────────────────────
  build-latest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          path: workflow-repo

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PACKAGES_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: workflow-repo
          file: workflow-repo/images/mcphub/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: ${{ github.event_name == 'schedule' || inputs.force_rebuild == 'true' }}
