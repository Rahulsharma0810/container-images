name: Build OpenWork

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      variants:
        description: 'Variants to build (comma-separated: stable,beta)'
        default: 'stable,beta'
        required: false
      force_rebuild:
        description: 'Force rebuild even if tag already exists'
        type: boolean
        default: false

env:
  IMAGE: sharmarahul0810/openwork
  GHCR_IMAGE: ghcr.io/rahulsharma0810/openwork
  UPSTREAM: different-ai/openwork

jobs:
  versions:
    runs-on: ubuntu-latest
    outputs:
      stable: ${{ steps.get.outputs.stable }}
      beta:   ${{ steps.get.outputs.beta }}
      has_beta: ${{ steps.get.outputs.has_beta }}
    steps:
      - id: get
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          releases=$(gh api repos/$UPSTREAM/releases --paginate --jq '.[]')
          stable=$(echo "$releases" | jq -rs '[.[] | select(.prerelease == false)] | first | .tag_name')
          beta=$(echo "$releases"   | jq -rs '[.[] | select(.prerelease == true)]  | first | .tag_name // ""')
          echo "stable=$stable"   >> $GITHUB_OUTPUT
          echo "beta=$beta"       >> $GITHUB_OUTPUT
          echo "has_beta=$( [[ -n "$beta" ]] && echo true || echo false )" >> $GITHUB_OUTPUT
          echo "Stable: $stable | Beta: $beta"

  build-stable:
    needs: versions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Check if should build
        id: check
        run: |
          variants="${{ inputs.variants || 'stable,beta' }}"
          echo "$variants" | grep -q "stable" || { echo "skip=true" >> $GITHUB_OUTPUT; exit 0; }
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://hub.docker.com/v2/repositories/$IMAGE/tags/${{ needs.versions.outputs.stable }}")
          if [[ "$status" == "200" && "${{ inputs.force_rebuild }}" != "true" ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip != 'true'
        with:
          repository: ${{ env.UPSTREAM }}
          ref: ${{ needs.versions.outputs.stable }}
          path: upstream

      - uses: docker/setup-qemu-action@v3
        if: steps.check.outputs.skip != 'true'
      - uses: docker/setup-buildx-action@v3
        if: steps.check.outputs.skip != 'true'
      - uses: docker/login-action@v3
        if: steps.check.outputs.skip != 'true'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v3
        if: steps.check.outputs.skip != 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        if: steps.check.outputs.skip != 'true'
        with:
          context: upstream
          file: images/openwork/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ needs.versions.outputs.stable }}
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:${{ needs.versions.outputs.stable }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-beta:
    needs: versions
    if: needs.versions.outputs.has_beta == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Check if should build
        id: check
        run: |
          variants="${{ inputs.variants || 'stable,beta' }}"
          echo "$variants" | grep -q "beta" || { echo "skip=true" >> $GITHUB_OUTPUT; exit 0; }
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://hub.docker.com/v2/repositories/$IMAGE/tags/${{ needs.versions.outputs.beta }}")
          if [[ "$status" == "200" && "${{ inputs.force_rebuild }}" != "true" ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip != 'true'
        with:
          repository: ${{ env.UPSTREAM }}
          ref: ${{ needs.versions.outputs.beta }}
          path: upstream

      - uses: docker/setup-qemu-action@v3
        if: steps.check.outputs.skip != 'true'
      - uses: docker/setup-buildx-action@v3
        if: steps.check.outputs.skip != 'true'
      - uses: docker/login-action@v3
        if: steps.check.outputs.skip != 'true'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v3
        if: steps.check.outputs.skip != 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        if: steps.check.outputs.skip != 'true'
        with:
          context: upstream
          file: images/openwork/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:beta
            ${{ env.IMAGE }}:${{ needs.versions.outputs.beta }}
            ${{ env.GHCR_IMAGE }}:beta
            ${{ env.GHCR_IMAGE }}:${{ needs.versions.outputs.beta }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
