name: Build Kimaki

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  push:
    branches: [main]
    paths:
      - 'images/kimaki/**'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if tag already exists'
        type: boolean
        default: false

env:
  IMAGE: sharmarahul0810/kimaki
  GHCR_IMAGE: ghcr.io/rahulsharma0810/kimaki
  UPSTREAM: remorses/kimaki

jobs:
  versions:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get.outputs.version }}
    steps:
      - id: get
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(gh api repos/$UPSTREAM/releases --jq '[.[] | select(.prerelease == false)] | first | .tag_name' | sed 's/.*@//')
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Version: $version"

  build:
    needs: versions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Check if should build
        id: check
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://hub.docker.com/v2/repositories/$IMAGE/tags/${{ needs.versions.outputs.version }}")
          if [[ "$status" == "200" && "${{ inputs.force_rebuild }}" != "true" && "${{ github.event_name }}" != "push" ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: docker/setup-qemu-action@v3
        if: steps.check.outputs.skip != 'true'
      - uses: docker/setup-buildx-action@v3
        if: steps.check.outputs.skip != 'true'
      - uses: docker/login-action@v3
        if: steps.check.outputs.skip != 'true'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v3
        if: steps.check.outputs.skip != 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PACKAGES_TOKEN }}
      - uses: docker/build-push-action@v6
        if: steps.check.outputs.skip != 'true'
        with:
          context: images/kimaki
          file: images/kimaki/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ needs.versions.outputs.version }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ needs.versions.outputs.version }}
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:${{ needs.versions.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
